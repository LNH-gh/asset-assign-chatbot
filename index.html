<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Asset Assign Support</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --yellow: #F5D547;
    --yellow-dark: #d4b730;
    --yellow-light: #fdf6c3;
    --black: #111111;
    --white: #ffffff;
    --bg: #f9f8f5;
    --text: #111111;
    --text-muted: #6b6b6b;
    --border: #e8e4d8;
    --radius: 14px;
  }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .header {
    background: var(--black);
    padding: 13px 18px;
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
    border-bottom: 3px solid var(--yellow);
  }

  .header-icon {
    width: 36px; height: 36px;
    background: var(--yellow); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
    border: 2px solid var(--yellow-dark);
  }

  .header-info h1 { font-size: 14px; font-weight: 700; color: var(--white); line-height: 1.2; }
  .header-info p  { font-size: 11.5px; color: #999; margin-top: 2px; }

  .status-dot {
    display: inline-block; width: 6px; height: 6px;
    background: #4ade80; border-radius: 50%;
    margin-right: 5px; vertical-align: middle;
  }

  .chat-area {
    flex: 1; overflow-y: auto;
    padding: 18px 14px;
    display: flex; flex-direction: column; gap: 14px;
    scroll-behavior: smooth;
  }

  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .message {
    display: flex; gap: 10px; align-items: flex-end;
    animation: fadeUp 0.2s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .message.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    border: 2px solid var(--black);
  }

  .msg-avatar.bot  { background: var(--yellow); font-size: 15px; }
  .msg-avatar.user { background: var(--black); color: var(--yellow); font-size: 10px; font-weight: 700; font-family: 'Space Mono', monospace; }

  .bubble {
    max-width: 78%; padding: 11px 14px;
    font-size: 13.5px; line-height: 1.6;
    border: 2px solid var(--black);
  }

  .message.bot .bubble {
    background: var(--white);
    border-radius: 14px 14px 14px 2px;
    box-shadow: 3px 3px 0px var(--yellow);
  }

  .message.user .bubble {
    background: var(--black); color: var(--white);
    border-radius: 14px 14px 2px 14px;
  }

  .typing { display: flex; gap: 5px; padding: 12px 14px; align-items: center; }
  .typing span {
    width: 7px; height: 7px; background: var(--black);
    border-radius: 50%; animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  .suggestions { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 9px; }

  button.suggestion-chip {
    padding: 6px 12px;
    background: var(--yellow-light); color: var(--black);
    border: 1.5px solid var(--black); border-radius: 20px;
    font-family: 'Space Grotesk', sans-serif; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
    box-shadow: 2px 2px 0 var(--black);
    appearance: none; -webkit-appearance: none; line-height: 1.4;
  }

  button.suggestion-chip:hover { background: var(--yellow); box-shadow: 1px 1px 0 var(--black); transform: translate(1px,1px); }
  button.suggestion-chip:active { transform: translate(2px,2px); box-shadow: none; }

  .upload-preview {
    max-width: 220px; border-radius: 10px;
    border: 2px solid var(--black); margin-bottom: 6px; display: block;
  }

  .file-badge {
    display: inline-flex; align-items: center; gap: 7px;
    background: var(--yellow-light); border: 1.5px solid var(--black);
    border-radius: 8px; padding: 6px 10px;
    font-size: 12px; font-weight: 600; margin-bottom: 6px;
  }

  .csv-card {
    background: var(--yellow-light);
    border: 2px solid var(--black);
    border-radius: 12px;
    padding: 14px 16px;
    margin-top: 10px;
    box-shadow: 3px 3px 0 var(--black);
  }

  .csv-card .csv-categories {
    font-size: 12px; color: var(--text-muted);
    margin-bottom: 10px; line-height: 1.7;
  }

  .csv-card .csv-categories strong {
    display: block; color: var(--black);
    margin-bottom: 3px; font-size: 12.5px;
  }

  .category-tag {
    display: inline-block; background: var(--white);
    border: 1.5px solid var(--black); border-radius: 20px;
    padding: 2px 9px; font-size: 11.5px; font-weight: 600;
    margin: 2px 2px 2px 0;
  }

  button.download-btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 9px 16px;
    background: var(--yellow); color: var(--black);
    border: 2px solid var(--black); border-radius: 9px;
    font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: all 0.15s;
    box-shadow: 3px 3px 0 var(--black);
    appearance: none; -webkit-appearance: none;
  }

  button.download-btn:hover { background: var(--yellow-dark); box-shadow: 1px 1px 0 var(--black); transform: translate(2px,2px); }
  button.download-btn:active { transform: translate(3px,3px); box-shadow: none; }

  .input-bar {
    background: var(--white);
    border-top: 2px solid var(--black);
    padding: 11px 13px;
    display: flex; gap: 9px; align-items: flex-end;
    flex-shrink: 0;
  }

  button.upload-btn {
    width: 38px; height: 38px;
    background: var(--white); color: var(--black);
    border: 2px solid var(--black); border-radius: 10px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; flex-shrink: 0;
    box-shadow: 2px 2px 0 var(--black);
    appearance: none; -webkit-appearance: none;
    font-size: 17px; line-height: 1;
  }

  button.upload-btn:hover { background: var(--yellow-light); box-shadow: 1px 1px 0 var(--black); transform: translate(1px,1px); }

  .input-wrap {
    flex: 1; background: var(--bg);
    border: 2px solid var(--black); border-radius: 11px;
    display: flex; align-items: center;
    padding: 4px 6px 4px 12px; transition: all 0.2s;
  }

  .input-wrap:focus-within {
    border-color: var(--yellow-dark);
    box-shadow: 0 0 0 3px rgba(245,213,71,0.25);
  }

  textarea {
    flex: 1; border: none; background: transparent;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13.5px; color: var(--text);
    resize: none; outline: none; line-height: 1.5;
    max-height: 110px; padding: 7px 0;
  }

  textarea::placeholder { color: #bbb; }

  button.send-btn {
    width: 38px; height: 38px;
    background: var(--yellow); border: 2px solid var(--black); border-radius: 10px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; flex-shrink: 0;
    box-shadow: 2px 2px 0 var(--black);
    appearance: none; -webkit-appearance: none;
  }

  button.send-btn:hover { background: var(--yellow-dark); box-shadow: 1px 1px 0 var(--black); transform: translate(1px,1px); }
  button.send-btn:active { transform: translate(2px,2px); box-shadow: none; }
  button.send-btn:disabled { background: #eee; border-color: #ccc; box-shadow: none; cursor: not-allowed; }
  button.send-btn svg { width: 16px; height: 16px; fill: var(--black); }

  .powered {
    text-align: center; font-size: 10px; color: #ccc;
    padding: 3px 0 2px; font-family: 'Space Mono', monospace;
  }

  #fileInput { display: none; }
</style>
</head>
<body>

<div class="header">
  <img src="./assetassign.app.png" alt="Asset Assign" style="width:36px;height:36px;border-radius:8px;border:2px solid var(--yellow-dark);object-fit:contain;background:var(--yellow);" />
  <div class="header-info">
    <h1>Amy · Asset Assign Support</h1>
    <p><span class="status-dot"></span>Ask anything &middot; Upload inventory lists</p>
  </div>
</div>

<div class="chat-area" id="chatArea"></div>

<input type="file" id="fileInput" accept="image/*,.csv,.xlsx,.xls,.txt" />

<div class="input-bar">
  <button class="upload-btn" type="button" onclick="document.getElementById('fileInput').click()" title="Upload inventory list or image">&#x1F4CE;</button>
  <div class="input-wrap">
    <textarea id="msgInput" rows="1" placeholder="Ask a question or describe your inventory..." oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
  </div>
  <button class="send-btn" id="sendBtn" type="button" onclick="sendMessage()">
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>
<div class="powered">Powered by Claude AI &middot; Asset Assign Help</div>

<script>
var WORKER_URL = "https://asset-assign-chatbot.letnicolehelp.workers.dev/";

var messages = [];
var isLoading = false;
var pendingAttachment = null;

window.addEventListener('DOMContentLoaded', function() {
  addBotMessage(
    "Hi there! I'm Amy, your Asset Assign support assistant. I can answer questions about the app, OR help you convert your existing inventory list into the correct CSV format for uploading.\n\nJust type a question, paste your inventory, or hit the paperclip to upload an image or file!",
    [
      "How does the phrase checker work?",
      "How do I create a reservation?",
      "Convert my inventory list to CSV",
      "What does it cost?",
      "How long is the free trial?",
      "Can I cancel anytime?"
    ]
  );
  document.getElementById('fileInput').addEventListener('change', handleFileSelected);
});

function handleFileSelected(e) {
  var file = e.target.files[0];
  if (file) processFile(file);
  e.target.value = '';
}

function processFile(file) {
  var isImage = file.type.startsWith('image/');
  var isCSV   = file.name.endsWith('.csv') || file.type === 'text/csv';
  var isText  = file.name.endsWith('.txt')  || file.type === 'text/plain';
  var isExcel = file.name.endsWith('.xlsx') || file.name.endsWith('.xls');

  if (isImage) {
    var reader = new FileReader();
    reader.onload = function(evt) {
      var base64 = evt.target.result.split(',')[1];
      pendingAttachment = { type: 'image', data: base64, mediaType: file.type, label: file.name, src: evt.target.result };
      showAttachmentPreview(file.name, 'image');
    };
    reader.readAsDataURL(file);
  } else if (isCSV || isText) {
    var reader2 = new FileReader();
    reader2.onload = function(evt) {
      pendingAttachment = { type: 'text', data: evt.target.result, label: file.name };
      showAttachmentPreview(file.name, 'file');
    };
    reader2.readAsText(file);
  } else if (isExcel) {
    addBotMessage("I can read images, CSV files, and plain text files! For Excel files (.xlsx), please save as CSV first (File > Save As > CSV in Excel, or File > Download > CSV in Google Sheets) and then upload that. Need help with that step?");
  } else {
    addBotMessage("I can work with images (photos of your inventory list), CSV files, and plain text files. Give one of those a try!");
  }
}

function showAttachmentPreview(label, type) {
  var existing = document.getElementById('attachPreviewBar');
  if (existing) existing.remove();

  var div = document.createElement('div');
  div.id = 'attachPreviewBar';
  div.style.cssText = 'display:flex;align-items:center;gap:8px;background:var(--yellow-light);border-top:1.5px solid var(--black);padding:7px 13px;font-size:12px;font-weight:600;flex-shrink:0;';

  var icon = document.createElement('span');
  icon.textContent = type === 'image' ? 'Image:' : 'File:';

  var nameSpan = document.createElement('span');
  nameSpan.textContent = label;
  nameSpan.style.cssText = 'flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';

  var closeBtn = document.createElement('button');
  closeBtn.type = 'button';
  closeBtn.textContent = 'x';
  closeBtn.style.cssText = 'background:none;border:none;cursor:pointer;font-size:15px;padding:0;line-height:1;';
  closeBtn.onclick = clearAttachment;

  div.appendChild(icon);
  div.appendChild(nameSpan);
  div.appendChild(closeBtn);

  document.getElementById('fileInput').after(div);

  var ta = document.getElementById('msgInput');
  if (!ta.value.trim()) {
    ta.value = "Please convert this inventory list to the Asset Assign CSV format.";
    autoResize(ta);
  }
}

function clearAttachment() {
  pendingAttachment = null;
  var bar = document.getElementById('attachPreviewBar');
  if (bar) bar.remove();
}

function escapeHtml(t) {
  var d = document.createElement('div');
  d.appendChild(document.createTextNode(t));
  return d.innerHTML;
}

function formatText(text) {
  return escapeHtml(text)
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function askQuestion(q) {
  var input = document.getElementById('msgInput');
  input.value = q;
  autoResize(input);
  setTimeout(sendMessage, 50);
}

function extractCategories(text) {
  var match = text.match(/\[CATEGORIES:\s*([^\]]+)\]/);
  if (!match) return [];
  return match[1].split(',').map(function(c) { return c.trim(); }).filter(Boolean);
}

function addBotMessage(text, chips) {
  chips = chips || [];
  var chatArea = document.getElementById('chatArea');
  var outer = document.createElement('div');
  outer.className = 'message bot';

  var avatar = document.createElement('div');
  avatar.className = 'msg-avatar bot';
  avatar.textContent = 'A';

  var inner = document.createElement('div');

  var csvMatch = text.match(/```csv\n([\s\S]*?)```/);
  var categories = extractCategories(text);

  var displayText = text
    .replace(/```csv\n[\s\S]*?```/, '')
    .replace(/\[CATEGORIES:[^\]]*\]/, '')
    .trim();

  if (displayText) {
    var bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = formatText(displayText);
    inner.appendChild(bubble);
  }

  if (csvMatch) {
    var csvContent = csvMatch[1].trim();
    var encoded = encodeURIComponent(csvContent);

    var card = document.createElement('div');
    card.className = 'csv-card';

    if (categories.length) {
      var catDiv = document.createElement('div');
      catDiv.className = 'csv-categories';
      var catLabel = document.createElement('strong');
      catLabel.textContent = 'Categories used in your CSV:';
      catDiv.appendChild(catLabel);
      categories.forEach(function(c) {
        var tag = document.createElement('span');
        tag.className = 'category-tag';
        tag.textContent = c;
        catDiv.appendChild(tag);
      });
      card.appendChild(catDiv);
    }

    var dlBtn = document.createElement('button');
    dlBtn.className = 'download-btn';
    dlBtn.type = 'button';
    dlBtn.textContent = 'Download CSV';
    dlBtn.onclick = function() { downloadCSV(decodeURIComponent(encoded)); };
    card.appendChild(dlBtn);
    inner.appendChild(card);
  }

  if (chips.length) {
    var sugDiv = document.createElement('div');
    sugDiv.className = 'suggestions';
    chips.forEach(function(c) {
      var btn = document.createElement('button');
      btn.className = 'suggestion-chip';
      btn.type = 'button';
      btn.textContent = c;
      btn.onclick = function() { askQuestion(c); };
      sugDiv.appendChild(btn);
    });
    inner.appendChild(sugDiv);
  }

  outer.appendChild(avatar);
  outer.appendChild(inner);
  chatArea.appendChild(outer);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function addUserMessage(text, attach) {
  var chatArea = document.getElementById('chatArea');
  var outer = document.createElement('div');
  outer.className = 'message user';

  var avatar = document.createElement('div');
  avatar.className = 'msg-avatar user';
  avatar.textContent = 'YOU';

  var inner = document.createElement('div');

  if (attach) {
    if (attach.type === 'image') {
      var img = document.createElement('img');
      img.src = attach.src;
      img.className = 'upload-preview';
      img.alt = 'Uploaded inventory';
      inner.appendChild(img);
    } else {
      var badge = document.createElement('div');
      badge.className = 'file-badge';
      badge.textContent = 'File: ' + attach.label;
      inner.appendChild(badge);
    }
  }

  if (text) {
    var bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    inner.appendChild(bubble);
  }

  outer.appendChild(avatar);
  outer.appendChild(inner);
  chatArea.appendChild(outer);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function showTyping() {
  var chatArea = document.getElementById('chatArea');
  var outer = document.createElement('div');
  outer.className = 'message bot';
  outer.id = 'typingIndicator';

  var avatar = document.createElement('div');
  avatar.className = 'msg-avatar bot';
  avatar.textContent = 'A';

  var bubble = document.createElement('div');
  bubble.className = 'bubble typing';
  for (var i = 0; i < 3; i++) {
    var span = document.createElement('span');
    bubble.appendChild(span);
  }

  outer.appendChild(avatar);
  outer.appendChild(bubble);
  chatArea.appendChild(outer);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function removeTyping() {
  var el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function downloadCSV(csvContent) {
  var blob = new Blob([csvContent], { type: 'text/csv' });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href = url;
  a.download = 'asset-assign-inventory.csv';
  a.click();
  URL.revokeObjectURL(url);
}

async function sendMessage() {
  if (isLoading) return;
  var input  = document.getElementById('msgInput');
  var text   = input.value.trim();
  var attach = pendingAttachment;

  if (!text && !attach) return;

  input.value = '';
  input.style.height = 'auto';
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  addUserMessage(text, attach);
  clearAttachment();

  var userContent;
  if (attach && attach.type === 'image') {
    userContent = [
      { type: 'image', source: { type: 'base64', media_type: attach.mediaType, data: attach.data } },
      { type: 'text', text: text || "Please convert this inventory list to the Asset Assign CSV format." }
    ];
  } else if (attach && attach.type === 'text') {
    userContent = (text ? text + '\n\n' : '') + 'Here is my inventory file (' + attach.label + '):\n\n' + attach.data;
  } else {
    userContent = text;
  }

  messages.push({ role: 'user', content: userContent });
  showTyping();

  var model = (attach && attach.type === 'image')
    ? 'claude-sonnet-4-20250514'
    : 'claude-haiku-4-5-20251001';

  try {
    var res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: model, max_tokens: 1500, messages: messages })
    });

    var data = await res.json();
    removeTyping();

    if (data.error) {
      addBotMessage("Hmm, something went wrong. Please try again in a moment.");
      console.error(data.error);
      messages.pop();
    } else {
      var reply = data.content[0].text;
      messages.push({ role: 'assistant', content: reply });
      addBotMessage(reply);
    }
  } catch (err) {
    removeTyping();
    addBotMessage("Sorry, I could not connect right now. Please try again in a moment.");
    console.error(err);
    messages.pop();
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('msgInput').focus();
}
</script>
</body>
</html>
